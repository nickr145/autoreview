services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Mount Docker socket so the agent can spin up sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Hot-reload source in dev
      - .:/app
    command: uv run uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000
